<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VR Player Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1a1a1a;
        color: #fff;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #player {
        flex: 1;
        width: 100%;
        min-height: 300px;
        background: #000;
        cursor: grab;
      }
      #player:active {
        cursor: grabbing;
      }
      .controls {
        padding: 16px;
        background: #222;
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
      }
      .controls label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }
      .controls input[type='range'] {
        width: 200px;
      }
      .controls input[type='url'] {
        flex: 1;
        min-width: 240px;
        padding: 6px 10px;
        background: #333;
        border: 1px solid #444;
        color: #fff;
        border-radius: 4px;
      }
      .controls button {
        padding: 6px 14px;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .controls button:hover {
        background: #1d4ed8;
      }
      .controls button:disabled {
        background: #555;
        cursor: not-allowed;
      }
      .fov-value {
        min-width: 40px;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <div class="controls">
      <input type="url" id="src" value="/vr.mp4" placeholder="全景视频源 URL" />
      <button id="load">加载</button>
      <button id="play">播放</button>
      <button id="pause">暂停</button>
      <button id="gyro">陀螺仪: 关</button>
      <label>
        FOV
        <input type="range" id="fov" min="30" max="120" step="1" value="120" />
        <span class="fov-value" id="fovValue">120°</span>
      </label>
      <label>
        WebGL
        <select id="webgl">
          <option value="1">WebGL 1.0</option>
          <option value="2" selected>WebGL 2.0</option>
        </select>
      </label>
      <label>
        锐化
        <input type="range" id="renderScale" min="0.5" max="2" step="0.25" value="2" />
        <span class="fov-value" id="renderScaleValue">2.0x</span>
      </label>
    </div>
    <script src="./vconsole.js"></script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
